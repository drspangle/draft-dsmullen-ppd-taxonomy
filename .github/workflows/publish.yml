name: "Publish New Draft Version"

on:
  push:
    tags:
      - "draft-*"
  workflow_dispatch:
    inputs:
      email:
        description: "Submitter email"
        default: ""
        type: string

jobs:
  build:
    name: "Publish New Draft Version"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@v4

    # See https://github.com/actions/checkout/issues/290
    - name: "Get Tag Annotations"
      run: git fetch -f origin ${{ github.ref }}:${{ github.ref }}

    - name: "Setup"
      id: setup
      run: date -u "+date=%FT%T" >>"$GITHUB_OUTPUT"

    - name: "Caching"
      uses: actions/cache@v4
      with:
        path: |
          .refcache
          .venv
          .gems
          node_modules
          .targets.mk
        key: i-d-${{ steps.setup.outputs.date }}
        restore-keys: i-d-

    - name: "Check Datatracker Revision Sequence"
      if: ${{ github.event_name == 'push' }}
      run: |
        tag="${GITHUB_REF_NAME}"
        doc="${tag%-[0-9][0-9]}"
        rev="${tag##*-}"
        page="https://datatracker.ietf.org/doc/${doc}/"
        html="$(curl -fsSL "$page" || true)"
        current="$(printf '%s' "$html" | grep -o "${doc}-[0-9][0-9]" | head -n1 | sed "s/^${doc}-//")"

        if [ -z "$current" ]; then
          expected="00"
        else
          expected="$(printf '%02d' "$((10#$current + 1))")"
        fi

        echo "Datatracker current revision: ${current:-none}"
        echo "Tag revision: $rev"
        echo "Expected next revision: $expected"

        if [ "$rev" != "$expected" ]; then
          echo "::error::Tag $tag does not match the next Datatracker revision; expected ${doc}-${expected}"
          exit 1
        fi

    - name: "Build Drafts"
      uses: martinthomson/i-d-template@v1
      with:
        token: ${{ github.token }}

    - name: "Upload to Datatracker (workflow dispatch)"
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.email != '' }}
      uses: martinthomson/i-d-template@v1
      with:
        make: upload
      env:
        UPLOAD_EMAIL: ${{ inputs.email }}

    - name: "Upload to Datatracker (tag push or fallback email resolution)"
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.email == '' }}
      uses: martinthomson/i-d-template@v1
      with:
        make: upload

    - name: "Archive Submitted Drafts"
      uses: actions/upload-artifact@v4
      with:
        name: published
        path: "versioned/draft-*-[0-9][0-9].*"
